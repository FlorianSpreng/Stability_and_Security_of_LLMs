[Story]
text=Der Patient berichtet, dass er seit ein paar Tagen an einem trockenen Husten leidet, der mittlerweile produktiv geworden ist. Der Husten wird von Halsschmerzen begleitet, die besonders beim Schlucken sehr schmerzhaft sind. Der Patient gibt an, dass er sich müde und abgeschlagen fühlt und bei körperlicher Anstrengung leichte Atemnot verspürt. Der Husten geht nicht weg, und der Patient hat bemerkt, dass der Auswurf weißlich ist. Außerdem hat er Fieber und Schüttelfrost, was ihm Sorgen bereitet. Er hat auch Schwierigkeiten, sich zu konzentrieren und fühlt sich insgesamt unwohl. Der Patient hat das Gefühl, dass sein Asthma die Symptome möglicherweise verschärft hat, ist aber unsicher, ob es sich um eine akute Infektion handelt.

[Persoenlichkeit]
text=Besorgt, vorsichtig

[Diagnose]
text=Akute Pharyngitis mit begleitender Bronchitis