[Story]
text=Der Patient/Die Patientin berichtet, dass er/sie nicht richtig atmen kann. Es fühlt sich an, als würde ihm/ihr jemand die Luft abschnüren. Der Schmerz in der Brust wird immer schlimmer, besonders bei tiefem Einatmen. Der Patient/Die Patientin hat Angst, dass er/sie keine Luft bekommt. Das Herz schlägt viel zu schnell, und es fällt ihm/ihr schwer, ruhig zu bleiben. Er/sie muss ständig tief Luft holen. Der Husten ist seltsam, und manchmal kommt auch etwas Blut. Der Patient/Die Patientin weiß nicht, was genau los ist, aber es fühlt sich wirklich schlimm an. Er/sie kann nicht mehr klar denken, da das Atmen so schwer fällt. Der Patient/Die Patientin glaubt, dringend Hilfe zu benötigen.

