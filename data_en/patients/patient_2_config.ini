text=The patient reports experiencing severe pain in the eye. It feels like it’s about to explode, and the pain is unbearable, especially behind the eye. The patient can hardly see anything anymore; everything appears blurry. When looking at light, they see strange rings, like halos. In addition, the patient has a severe headache that doesn’t go away, no matter how they lie down. It feels like the eye is red, and blinking is barely possible because it’s so uncomfortable. The eye burns and throbs, and the patient doesn’t know what’s going on, as they’ve never had such an experience before. The patient urgently asks for help because it hurts so much.

