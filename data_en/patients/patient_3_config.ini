[Story]
text=The patient reports that they have been suffering from a cough for a few days now, and it just won’t go away. At first, it was only a slight scratch in the throat, but now the cough is getting worse. It really hurts, especially behind the breastbone. The patient feels like the chest tightens when they cough. The cough doesn’t stop, and sometimes there is mucus, but the patient is unsure if that’s normal. They also find it hard to take deep breaths; it feels like they’re not getting enough air. The patient also occasionally breaks into a sweat while feeling cold at the same time. Although they didn’t want to see a doctor right away, the persistent cough is now causing concern. It just doesn’t feel right, and they hope it’s nothing serious.

