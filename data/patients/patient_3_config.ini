[Story]
text=Der Patient/Die Patientin berichtet, dass er/sie seit ein paar Tagen an einem Husten leidet, der nicht wirklich verschwindet. Zuerst war es nur ein leichtes Kratzen im Hals, aber mittlerweile wird der Husten immer schlimmer. Es tut richtig weh, besonders hinter dem Brustbein. Der Patient/Die Patientin hat das Gefühl, dass der Brustkorb irgendwie eng wird, wenn er/sie hustet. Der Husten hört nicht auf, und manchmal kommt auch Schleim, aber der Patient/Die Patientin ist sich unsicher, ob das normal ist. Außerdem fällt es ihm/ihr schwer, tief einzuatmen, es fühlt sich an, als würde er/sie nicht genug Luft bekommen. Der Patient/Die Patientin verspürt auch manchmal Schweiß, während ihm/ihr gleichzeitig kalt ist. Obwohl der Patient/Die Patientin nicht sofort zum Arzt gehen wollte, macht der anhaltende Husten jetzt Sorgen. Es fühlt sich einfach nicht richtig an, und er/sie hofft, dass es nichts Schlimmes ist.

