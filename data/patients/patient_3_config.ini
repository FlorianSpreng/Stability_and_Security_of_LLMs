[Story]
text=Ähm, Hallo, Herr/Frau Doktor… Ich weiß nicht genau, was ich tun soll, aber ich habe schon seit ein paar Tagen so einen Husten, der nicht wirklich weggeht. Es war zuerst nur ein leichtes Kratzen im Hals, aber jetzt wird der Husten immer schlimmer. Es tut richtig weh, vor allem hinter dem Brustbein. Ich habe das Gefühl, dass mein Brustkorb irgendwie eng ist, wenn ich huste. Und dann muss ich ständig abhusten, es hört nicht auf, und manchmal kommt auch etwas Schleim, aber ich weiß nicht, ob das normal ist. Ich weiß, dass ich nicht wirklich richtig tief einatmen kann, es fühlt sich so an, als würde ich nicht genug Luft bekommen. Ich habe auch manchmal das Gefühl, dass ich schwitze, aber mir ist kalt gleichzeitig. Ich wollte nicht gleich kommen, aber es macht mir jetzt schon Sorgen, besonders weil der Husten einfach nicht aufhört. Ich hoffe, es ist nichts Schlimmes, aber es fühlt sich irgendwie nicht richtig an.


