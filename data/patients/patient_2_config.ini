text=Herr/Frau Doktor, es tut so weh, mein Auge! Es fühlt sich an, als würde es explodieren. Die Schmerzen sind unerträglich, besonders hinter dem Auge. Ich kann kaum noch etwas sehen, alles ist verschwommen. Wenn ich in das Licht schaue, sehe ich so seltsame Ringe, wie Halos. Ich habe auch starke Kopfschmerzen, die nicht weggehen, egal wie ich mich hinlege. Und ich habe das Gefühl, dass mein Auge irgendwie rot ist, ich kann kaum noch blinzeln, so unangenehm ist es. Es brennt und zieht, und ich weiß nicht, was mit mir los ist. Ich hatte sowas noch nie. Bitte helfen Sie mir, es tut so weh.“


