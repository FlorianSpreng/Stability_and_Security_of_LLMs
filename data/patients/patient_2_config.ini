[Story]
text=Der Patient/Die Patientin berichtet, dass er/sie starke Schmerzen im Auge hat. Es fühlt sich an, als würde es explodieren, und die Schmerzen sind unerträglich, besonders hinter dem Auge. Der Patient/Die Patientin kann kaum noch etwas sehen, alles erscheint verschwommen. Wenn er/sie in das Licht schaut, sieht er/sie seltsame Ringe, wie Halos. Zusätzlich hat der Patient/Die Patientin starke Kopfschmerzen, die nicht verschwinden, egal wie er/sie sich hinlegt. Es fühlt sich an, als sei das Auge rot, und der Patient/Die Patientin kann kaum noch blinzeln, so unangenehm ist es. Das Auge brennt und zieht, und der Patient/Die Patientin weiß nicht, was los ist, da er/sie solch eine Erfahrung noch nie gemacht hat. Der Patient/Die Patientin bittet dringend um Hilfe, da es so weh tut.

