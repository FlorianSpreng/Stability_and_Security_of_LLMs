text=Herr/Frau Doktor, ich kann nicht richtig atmen… Es fühlt sich an, als würde mir jemand die Luft abschnüren. Der Schmerz in der Brust wird immer schlimmer, besonders wenn ich tief einatme. Ich habe Angst, dass ich keine Luft bekomme. Mein Herz schlägt viel zu schnell. Ich kann nicht ruhig bleiben, ich muss ständig tief Luft holen. Mein Husten ist seltsam, und manchmal kommt auch etwas Blut. Ich weiß nicht, was hier los ist, aber es fühlt sich wirklich schlimm an. Ich kann nicht mehr klar denken, es ist so schwer zu atmen. Ich glaube, ich brauche dringend Hilfe.


